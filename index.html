<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before/After Slider</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #121212; 
        }

        /* The Main Wrapper */
        .wrapper {
            position: relative;
            width: 95vw;        /* Uses 95% of your screen width */
            max-width: 1200px;  /* Limits it so it doesn't get distorted on huge monitors */
            aspect-ratio: 16 / 9; 
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }

        /* Both images are stacked perfectly */
        .image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* The actual photos */
        img {
            display: block;
            width: 95vw;        /* Must match the wrapper width */
            max-width: 1200px;  /* Must match the wrapper max-width */
            height: 100%;
            object-fit: cover;  /* This keeps them from stretching */
            pointer-events: none;
        }

        /* The top layer (Before) that gets "cut" by the slider */
        .before-layer {
            width: 50%;
            z-index: 2;
            overflow: hidden;
            border-right: 4px solid white;
        }

        /* The Range Slider Control */
        .slider {
            position: absolute;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0);
            outline: none;
            margin: 0;
            transition: all 0.2s;
            cursor: ew-resize;
            z-index: 10;
        }

        /* Customizing the slider handle to be a thin line */
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 4px;
            height: 100vh;
            background: white;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="image after-layer">
        <img src="after.jpg" alt="After">
    </div>

    <div class="image before-layer" id="before-box">
        <img src="before.jpg" alt="Before">
    </div>

    <input type="range" min="0" max="100" value="50" class="slider" id="drag-line">
</div>

<script>
    const slider = document.getElementById('drag-line');
    const beforeBox = document.getElementById('before-box');

    slider.addEventListener('input', (e) => {
        let position = e.target.value;
        beforeBox.style.width = position + '%';
    });
</script>

</body>
</html>
